<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhotoStudio - Resize</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">PhotoStudio</p>
      <h1>Resize Studio</h1>
      <p class="sub">拖放相片即做。支援 HEIC/HEIF、JPG、PNG，全程本機處理，不上傳。</p>
    </header>

    <section class="panel controls" aria-labelledby="dropTitle">
      <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="拖放圖片到這裡，或點擊選擇檔案">
        <p id="dropTitle" class="drop-title">拖動圖片到這裡</p>
        <p class="drop-sub">或點擊選擇檔案</p>
        <p class="drop-hint">支援：HEIC/HEIF、JPG、PNG、WEBP、BMP、TIFF</p>
      </div>

      <input id="fileInput" class="hidden-input" type="file" accept="image/*,.heic,.heif" multiple />

      <div class="queue-head">
        <p class="queue-title">待處理清單</p>
        <p id="queueCount" class="queue-count">0 個檔案</p>
      </div>
      <div id="queueList" class="queue-list"></div>

      <div class="grid">
        <label class="field">
          <span>長邊尺寸 (px)</span>
          <input id="maxEdge" type="number" min="100" max="10000" value="1200" />
        </label>

        <label class="field">
          <span>JPG 品質 (%)</span>
          <input id="quality" type="number" min="1" max="100" value="85" />
        </label>

        <label class="field">
          <span>批次改名：數字位置</span>
          <select id="renameMode">
            <option value="keep">保持原檔名</option>
            <option value="prefix">數字在前（001-文字）</option>
            <option value="middle">數字在中（文-001-字）</option>
            <option value="suffix">數字在後（文字-001）</option>
          </select>
        </label>

        <label class="field">
          <span>改名文字（留空=用原檔名）</span>
          <input id="renameText" type="text" value="" maxlength="80" placeholder="例如：旅行相" />
        </label>

        <label class="field">
          <span>流水號位數 (digit)</span>
          <input id="renameDigits" type="number" min="1" max="12" value="3" />
        </label>

        <label class="field">
          <span>文字與數字分隔字元</span>
          <input id="renameSeparator" type="text" value="-" maxlength="8" />
        </label>
      </div>

      <div class="actions">
        <button id="processBtn" class="btn primary">開始處理</button>
        <button id="downloadBtn" class="btn" disabled>下載全部 JPG</button>
        <button id="clearBtn" class="btn ghost">清空</button>
      </div>

      <p id="status" class="status">未開始</p>
      <p id="report" class="report"></p>
    </section>

    <section class="panel">
      <div class="list-head">
        <h2>結果</h2>
        <p id="count">0 個檔案</p>
      </div>
      <div id="resultList" class="result-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
